services:
  db:
    image: mariadb:${MARIADB_VERSION}
    restart: always
    container_name: ${APP_NAME}-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${MARIADB_DATA_DIR}:/var/lib/mysql
      - ${MARIADB_ETC_DIR}:/etc/mysql
      - ${MARIADB_CONF_DIR}:/etc/mysql/conf.d
    ports:
      - ${MYSQL_PORT:-3306}:3306
    networks:
      - cloud-network

  redis:
    image: redis:7
    restart: always
    container_name: ${APP_NAME}-redis
    ports:
      - ${REDIS_PORT:-6379}:6379
    networks:
      - cloud-network

  app:
    image: nextcloud:production-apache
    restart: always
    container_name: ${APP_NAME}-nextcloud
    depends_on:
      - db
      - redis
    ports:
      - ${APP_PORT:-8080}:80
    volumes:
      - ${NEXT_CONFIG}:/var/www/html/config
      - ${NEXT_CUSTOM_APPS}:/var/www/html/custom_apps
      - ${NEXT_DATA}:/var/www/html/data
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
    networks:
      - cloud-network

  ws-relay:
    build: ./ws-relay
    restart: always
    environment:
      WS_PORT: 8080
      WS_SECRET: ${WS_SECRET}
    ports:
      - 8090:8080

networks:
  cloud-network:
    driver: bridgeservices:
  db:
    image: mariadb:${MARIADB_VERSION}
    restart: always
    container_name: ${APP_NAME}-mariadb
    environment:
          MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE: ${MYSQL_DATABASE}
          MYSQL_USER: ${MYSQL_USER}
          MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${MARIADB_DATA_DIR}:/var/lib/mysql
      - ${MARIADB_ETC_DIR}:/etc/mysql
      - ${MARIADB_CONF_DIR}:/etc/mysql/conf.d
    ports:
      - ${MYSQL_PORT:-3306}:3306
    networks:
      -   cloud-network

  app:
  image: nextcloud:production-apache
  restart: always
  container_name: ${APP_NAME}-nextcloud
  ports:
    - ${APP_PORT:-8080}:80
  volumes:
    - ${NEXT_CONFIG}:/var/www/html/config
    - ${NEXT_CUSTOM_APPS}:/var/www/html/custom_apps
    - ${NEXT_DATA}:/var/www/html/data
  networks:
    - cloud-network
  depends_on:
    - db
  environment:
    - NEXTCLOUD_ADMIN_USER=admin
    - NEXTCLOUD_ADMIN_PASSWORD=NEU_SETZEN
    - MYSQL_HOST=db
    - MYSQL_DATABASE=${MYSQL_DATABASE}
    - MYSQL_USER=${MYSQL_USER}
    - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    
  redis:
    image: redis:7
    restart: always
    container_name: ${APP_NAME}-redis
    ports:
      - ${REDIS_PORT}:6379
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge
